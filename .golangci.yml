version: "2"
linters:
  enable:
    - misspell
    - revive
    - staticcheck
  disable:
    - errcheck
  settings:
    revive:
      rules:
        - name: dot-imports
          disabled: true
  exclusions:
    generated: lax
    rules:
      - path: (.+)\.go$
        text: stutters
      - path: (.+)\.go$
        text: underscores
      - path: (.+)\.go$
        text: unexported-return
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
